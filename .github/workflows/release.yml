name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 v1.0.0）"
        required: true
        default: "v0.0.0-dev"

env:
  GODOT_VERSION: "4.6"
  PROJECT_NAME: "land"

jobs:
  export:
    name: Export (${{ matrix.platform }})
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: web
            preset: "Web"
            artifact: "land-web"
            out_dir: "build/web"
            out_file: "index.html"
          - platform: windows
            preset: "Windows Desktop"
            artifact: "land-windows"
            out_dir: "build/windows"
            out_file: "land.exe"
          - platform: macos
            preset: "macOS"
            artifact: "land-macos"
            out_dir: "build/macos"
            out_file: "land.zip"
          - platform: android
            preset: "Android"
            artifact: "land-android"
            out_dir: "build/android"
            out_file: "land.apk"

    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          cp -r /root/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/* \
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Setup Android SDK & debug keystore
        if: matrix.platform == 'android'
        run: |
          ANDROID_SDK="${ANDROID_HOME:-/root/android/sdk}"
          JAVA_SDK=$(dirname $(dirname $(readlink -f $(which java))))
          echo "ANDROID_SDK=${ANDROID_SDK}"
          echo "JAVA_SDK=${JAVA_SDK}"
          # 安装匹配 Target SDK 33 的 build tools
          yes | "${ANDROID_SDK}/cmdline-tools/latest/bin/sdkmanager" \
            "build-tools;33.0.2" || true
          mkdir -p ~/.config/godot/keystores ~/.config/godot
          keytool -genkey -v \
            -keystore ~/.config/godot/keystores/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          {
            echo '[gd_resource type="EditorSettings" format=3]'
            echo ''
            echo '[resource]'
            echo "export/android/android_sdk_path = \"${ANDROID_SDK}\""
            echo "export/android/java_sdk_path = \"${JAVA_SDK}\""
            echo "export/android/debug_keystore = \"${HOME}/.config/godot/keystores/debug.keystore\""
            echo 'export/android/debug_keystore_user = "androiddebugkey"'
            echo 'export/android/debug_keystore_pass = "android"'
          } > ~/.config/godot/editor_settings-4.tres
          "${ANDROID_SDK}/platform-tools/adb" start-server || true

      - name: Create export directory
        run: mkdir -p ${{ matrix.out_dir }}

      - name: Export — ${{ matrix.platform }}
        run: |
          if [ "${{ matrix.platform }}" = "android" ]; then
            godot --headless --export-debug "${{ matrix.preset }}" \
              "${{ matrix.out_dir }}/${{ matrix.out_file }}"
          else
            godot --headless --export-release "${{ matrix.preset }}" \
              "${{ matrix.out_dir }}/${{ matrix.out_file }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.out_dir }}/

  release:
    name: Create GitHub Release
    needs: export
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [ "$name" = "land-android" ]; then
              cp "$dir/land.apk" "land-android.apk"
            else
              zip -r "${name}.zip" "$dir"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            artifacts/*.zip
            artifacts/land-android.apk
          generate_release_notes: true

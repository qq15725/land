name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 v1.0.0）"
        required: true
        default: "v0.0.0-dev"

env:
  GODOT_VERSION: "4.6"
  PROJECT_NAME: "land"

jobs:
  export:
    name: Export (${{ matrix.platform }})
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: web
            preset: "Web"
            artifact: "land-web"
            out_dir: "build/web"
            out_file: "index.html"
          - platform: windows
            preset: "Windows Desktop"
            artifact: "land-windows"
            out_dir: "build/windows"
            out_file: "land.exe"
          - platform: macos
            preset: "macOS"
            artifact: "land-macos"
            out_dir: "build/macos"
            out_file: "land.zip"

    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          cp -r /root/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/* \
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Create export directory
        run: mkdir -p ${{ matrix.out_dir }}

      - name: Export — ${{ matrix.platform }}
        run: |
          godot --headless --export-release "${{ matrix.preset }}" \
            "${{ matrix.out_dir }}/${{ matrix.out_file }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.out_dir }}/

  release:
    name: Create GitHub Release
    needs: export
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip each platform
        run: |
          cd artifacts
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: artifacts/*.zip
          generate_release_notes: true
